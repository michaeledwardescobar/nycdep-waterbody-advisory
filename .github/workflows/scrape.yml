name: Poll DEP Waterbody Advisories

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Poll the advisory API
        run: python scraper/scrape.py

      - name: Commit new data
        run: |
          git config user.name "advisory-logger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/
          if [ -d site_js ]; then git add -A site_js/; fi
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi
          git commit -m "poll: $(date -u +%Y-%m-%dT%H:%MZ)"
          if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
            git rebase --abort
            echo "Repo changed mid-run; skipping this poll. Next run will succeed."
            exit 0
          fi
          git push || echo "Push race; next poll will retry."
