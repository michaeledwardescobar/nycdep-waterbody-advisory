name: Harvest rainfall history

on:
  workflow_dispatch: {}   # manual trigger only â€” run from the Actions tab

permissions:
  contents: write

concurrency:
  group: scrape           # shares a lane with the poller; they take turns
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Harvest full rainfall history
        run: python scraper/harvest.py

      - name: Commit harvested data
        run: |
          git config user.name "advisory-logger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi
          git commit -m "harvest: rainfall history $(date -u +%Y-%m-%dT%H:%MZ)"
          if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
            git rebase --abort
            echo "Repo changed mid-run; rerun the harvest to commit."
            exit 0
          fi
          git push
